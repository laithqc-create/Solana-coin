name: Build Solana Smart Contract

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy
      
      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache Build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      
      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor
      
      - name: Show versions
        run: |
          rustc --version
          cargo --version
          anchor --version
          solana --version
      
      - name: Build smart contract
        working-directory: ./ecosystem-token
        run: |
          anchor build --skip-lint
        timeout-minutes: 30
      
      - name: Run Cargo tests
        working-directory: ./ecosystem-token
        run: cargo test --lib --release || true
        timeout-minutes: 30
      
      - name: Lint with clippy
        working-directory: ./ecosystem-token
        run: cargo clippy --all-targets || true
      
      - name: Check format
        working-directory: ./ecosystem-token
        run: cargo fmt -- --check || true
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            ecosystem-token/target/deploy/*.so
            ecosystem-token/target/idl/
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    name: Test Suite
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Run tests
        working-directory: ./ecosystem-token
        run: cargo test --lib || true
        timeout-minutes: 30
