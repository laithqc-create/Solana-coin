name: Build & Deploy Ecosystem Token

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to devnet?'
        required: false
        default: 'false'

env:
  RUST_BACKTRACE: 1
  SOLANA_CLI_VERSION: v1.18.0

jobs:
  build:
    name: Build Smart Contract
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/${SOLANA_CLI_VERSION}/install)"
          export PATH="/root/.local/share/solana/install/active_release/bin:$PATH"
          echo "/root/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana --version

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor
          anchor --version

      - name: Build smart contract
        run: |
          cd ecosystem-token
          anchor build --skip-lint
        
      - name: Run clippy
        run: |
          cd ecosystem-token
          cargo clippy --all-targets -- -D warnings || true

      - name: Generate IDL
        run: |
          cd ecosystem-token
          anchor idl build || true
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: compiled-program
          path: ecosystem-token/target/deploy/*.so
          if-no-files-found: ignore

      - name: Upload IDL
        uses: actions/upload-artifact@v3
        with:
          name: idl
          path: ecosystem-token/target/idl/
          if-no-files-found: ignore

  deploy:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event.inputs.deploy == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/${SOLANA_CLI_VERSION}/install)"
          export PATH="/root/.local/share/solana/install/active_release/bin:$PATH"
          echo "/root/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana --version

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor
          anchor --version

      - name: Setup Solana config
        run: |
          solana config set --url devnet
          echo "${{ secrets.SOLANA_KEYPAIR }}" > ~/.config/solana/id.json
          chmod 600 ~/.config/solana/id.json
        env:
          SOLANA_KEYPAIR: ${{ secrets.SOLANA_KEYPAIR }}

      - name: Check balance
        run: |
          solana balance --url devnet || echo "No balance yet"

      - name: Build for deployment
        run: |
          cd ecosystem-token
          anchor build

      - name: Deploy to devnet
        run: |
          cd ecosystem-token
          anchor deploy --provider.cluster devnet

      - name: Generate IDL
        run: |
          cd ecosystem-token
          PROGRAM_ID=$(grep "ecosystem_token" Anchor.toml | tail -1 | awk '{print $NF}' | tr -d '"')
          echo "Program ID: $PROGRAM_ID"
          anchor idl fetch $PROGRAM_ID -o target/idl/ecosystem_token.json || true

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ github.run_number }}
          release_name: Build #${{ github.run_number }}
          body: |
            Automated build and deployment to Solana devnet
            
            Build artifacts available in Actions tab
          draft: false
          prerelease: false
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/${SOLANA_CLI_VERSION}/install)"
          export PATH="/root/.local/share/solana/install/active_release/bin:$PATH"
          echo "/root/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor

      - name: Run tests
        run: |
          cd ecosystem-token
          cargo test --lib || true

      - name: Lint
        run: |
          cd ecosystem-token
          cargo fmt -- --check || true
