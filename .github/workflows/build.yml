name: Build Solana Smart Contract

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build smart contract
        working-directory: ./ecosystem-token/programs/ecosystem-token
        run: |
          echo "=== Building ==="
          cargo build --release
          echo "=== Finding outputs ==="
          find target -name "*.so" -o -name "*ecosystem*" 2>/dev/null | head -20

      - name: Collect artifact
        if: always()
        run: |
          mkdir -p artifacts
          # Find the .so wherever it is
          find ecosystem-token -name "*.so" 2>/dev/null -exec cp {} artifacts/ \;
          # Also copy any dylib
          find ecosystem-token -name "*ecosystem_token*" 2>/dev/null -exec cp {} artifacts/ \; || true
          echo "=== Artifacts collected ==="
          ls -lah artifacts/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/
          retention-days: 30
          if-no-files-found: warn

  test:
    runs-on: ubuntu-latest
    name: Test Suite

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: ./ecosystem-token/programs/ecosystem-token
        run: cargo test --lib || true
        timeout-minutes: 10
