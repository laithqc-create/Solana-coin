name: Build Solana Smart Contract

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Verify Node.js
        run: |
          echo "=== Node.js Setup ==="
          node --version
          npm --version
          echo "Node path: $(which node)"
          echo "npm path: $(which npm)"
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Verify Rust
        run: |
          echo "=== Rust Setup ==="
          rustc --version
          cargo --version
          echo "rustc path: $(which rustc)"
      
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-
      
      - name: Install Anchor CLI
        run: |
          echo "=== Installing Anchor CLI ==="
          npm install -g @coral-xyz/anchor
          
          # Get npm bin directory and add to PATH
          NPM_BIN=$(npm config get prefix)/bin
          echo "npm bin directory: $NPM_BIN"
          echo "$NPM_BIN" >> $GITHUB_PATH
          
          echo "Anchor installation complete"
      
      - name: Verify all tools
        run: |
          echo "=== Checking Installed Tools ==="
          echo "Node.js: $(node --version)"
          echo "npm: $(npm --version)"
          echo "Rust: $(rustc --version)"
          echo "Cargo: $(cargo --version)"
          
          # Try to find anchor
          echo ""
          echo "Looking for Anchor CLI..."
          command -v anchor && echo "Anchor found in PATH: $(anchor --version)" || echo "Anchor will be located via npm bin directory"
      
      - name: Check project
        run: |
          echo "=== Project Structure ==="
          ls -la ecosystem-token/ | head -20
          echo ""
          echo "=== Anchor.toml ==="
          cat ecosystem-token/Anchor.toml | head -15
      
      - name: Build smart contract
        working-directory: ./ecosystem-token
        run: |
          echo "=== Building Smart Contract ==="
          
          # Use npx to run anchor directly (doesn't need PATH)
          npx @coral-xyz/anchor build --skip-lint
      
      - name: Run tests
        working-directory: ./ecosystem-token
        run: cargo test --lib --release || true
      
      - name: Lint
        working-directory: ./ecosystem-token
        run: cargo clippy --all-targets || true
      
      - name: Format check
        working-directory: ./ecosystem-token
        run: cargo fmt -- --check || true
      
      - name: List artifacts
        if: always()
        run: |
          echo "=== Build Artifacts ==="
          find ecosystem-token/target/deploy -name "*.so" 2>/dev/null || echo "No .so files"
          echo ""
          echo "=== IDL Files ==="
          find ecosystem-token/target/idl -type f 2>/dev/null || echo "No IDL files"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ecosystem-token/target/deploy/*.so
            ecosystem-token/target/idl/
          retention-days: 30
          if-no-files-found: warn

  test:
    runs-on: ubuntu-latest
    name: Test Suite
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run tests
        working-directory: ./ecosystem-token
        run: |
          echo "Running unit tests..."
          cargo test --lib || true
        timeout-minutes: 30


