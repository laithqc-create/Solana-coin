name: Build Solana Smart Contract

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Solana tools from GitHub
        run: |
          echo "=== Downloading Solana from GitHub releases ==="
          curl -L --retry 3 \
            https://github.com/anza-xyz/agave/releases/download/v1.18.26/solana-release-x86_64-unknown-linux-gnu.tar.bz2 \
            -o solana.tar.bz2
          
          echo "Extracting..."
          tar -xjf solana.tar.bz2
          
          SOLANA_BIN="$(pwd)/solana-release/bin"
          echo "Solana bin: $SOLANA_BIN"
          echo "$SOLANA_BIN" >> $GITHUB_PATH
          echo "SOLANA_BIN=$SOLANA_BIN" >> $GITHUB_ENV
          
          export PATH="$SOLANA_BIN:$PATH"
          solana --version
          ls "$SOLANA_BIN" | grep -i cargo

      - name: Build smart contract
        working-directory: ./ecosystem-token
        run: |
          echo "=== Building with Solana tools ==="
          export PATH="$SOLANA_BIN:$PATH"
          
          echo "cargo-build-sbf: $(which cargo-build-sbf 2>/dev/null || echo 'not found')"
          echo "cargo-build-bpf: $(which cargo-build-bpf 2>/dev/null || echo 'not found')"
          
          if command -v cargo-build-sbf &> /dev/null; then
            echo "Using cargo-build-sbf..."
            cargo-build-sbf --manifest-path programs/ecosystem-token/Cargo.toml
          elif command -v cargo build-sbf &> /dev/null; then
            cargo build-sbf --manifest-path programs/ecosystem-token/Cargo.toml
          else
            echo "Using cargo-build-bpf..."
            cargo-build-bpf --manifest-path programs/ecosystem-token/Cargo.toml
          fi

      - name: List artifacts
        if: always()
        run: |
          echo "=== Searching entire workspace for .so files ==="
          find /home/runner/work -name "*.so" 2>/dev/null | head -20 || echo "No .so files found anywhere"
          echo ""
          echo "=== ecosystem-token/target contents ==="
          ls -la ecosystem-token/target/ 2>/dev/null || echo "No target dir"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ecosystem-token/target/deploy/*.so
            ecosystem-token/target/sbf-solana-solana/release/*.so
            ecosystem-token/target/bpfel-unknown-unknown/release/*.so
          retention-days: 30
          if-no-files-found: warn

  test:
    runs-on: ubuntu-latest
    name: Test Suite

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: ./ecosystem-token/programs/ecosystem-token
        run: cargo test --lib || true
        timeout-minutes: 10
