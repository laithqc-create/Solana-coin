name: Build Solana Smart Contract

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache Rust cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor
          echo "Anchor installed at:"
          which anchor
          anchor --version
      
      - name: Show installed versions
        run: |
          echo "=== Rust ==="
          rustc --version
          cargo --version
          echo "=== Node.js ==="
          node --version
          npm --version
          echo "=== Anchor ==="
          anchor --version
      
      - name: Build smart contract
        working-directory: ./ecosystem-token
        run: |
          echo "Building smart contract..."
          anchor build --skip-lint
          echo "Build complete!"
      
      - name: Run Cargo tests
        working-directory: ./ecosystem-token
        run: |
          echo "Running tests..."
          cargo test --lib --release || true
      
      - name: Lint with clippy
        working-directory: ./ecosystem-token
        run: |
          echo "Running clippy..."
          cargo clippy --all-targets || true
      
      - name: Check format
        working-directory: ./ecosystem-token
        run: |
          echo "Checking format..."
          cargo fmt -- --check || true
      
      - name: List build outputs
        if: always()
        run: |
          echo "=== Smart Contract Binary ==="
          find ecosystem-token/target/deploy -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "No .so files found"
          echo ""
          echo "=== IDL Files ==="
          find ecosystem-token/target/idl -type f -exec ls -lh {} \; 2>/dev/null || echo "No IDL files found"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ecosystem-token/target/deploy/*.so
            ecosystem-token/target/idl/
          retention-days: 30
          if-no-files-found: warn

  test:
    runs-on: ubuntu-latest
    name: Test Suite
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run tests
        working-directory: ./ecosystem-token
        run: |
          echo "Running unit tests..."
          cargo test --lib || true
        timeout-minutes: 30


