name: Build & Deploy Solana Smart Contract

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.29.0"
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "1.85.0"

jobs:
  build:
    name: Compile SBF Bytecode
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Solana CLI ─────────────────────────────────────────────────────────
      - name: Install Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Solana toolchain
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}

      # ── Node / Anchor CLI ─────────────────────────────────────────────────
      - name: Install Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Anchor CLI ${{ env.ANCHOR_VERSION }}
        run: |
          npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      # ── Versions ──────────────────────────────────────────────────────────
      - name: Print toolchain versions
        run: |
          rustc --version
          cargo --version
          solana --version
          anchor --version

      # ── Program ID ────────────────────────────────────────────────────────
      # On first run: placeholder ID is used (build will succeed)
      # After keygen: set PROGRAM_ID secret in GitHub → Settings → Secrets
      - name: Inject Program ID into lib.rs
        run: |
          PROGRAM_ID="${{ secrets.PROGRAM_ID }}"
          if [ -z "$PROGRAM_ID" ]; then
            echo "⚠️  PROGRAM_ID secret not set — using placeholder. Set it in GitHub Secrets after keygen."
            PROGRAM_ID="11111111111111111111111111111112"
          fi
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/" \
            ecosystem-token/programs/ecosystem-token/src/lib.rs
          echo "✅ Program ID set to: $PROGRAM_ID"

      # ── Lockfile + edition2024 compatibility ─────────────────────────────────
      # anchor build uses Solana's BUNDLED platform-tools cargo (~1.75) for the
      # actual SBF compile. That bundled cargo cannot parse Cargo.toml manifests
      # that declare `edition = "2024"` — it fails with:
      #   "feature `edition2024` is required"
      #
      # Strategy:
      #   1. Use modern system cargo (1.85) to fully resolve the dep graph.
      #   2. Pin every known edition2024 package DOWN to its last non-edition2024
      #      release via --precise so the bundled cargo only sees compatible manifests.
      #   3. Downgrade lockfile format v4 → v3 (bundled cargo can't parse v4 either).
      #
      # Known edition2024 packages pinned:
      #   indexmap     2.14.0 → 2.13.2  (edition2024 first appeared in 2.14.0)
      #   block-buffer 0.12.1 → 0.10.4  (last version before edition2024 chain)
      #   digest       0.11.3 → 0.10.7  (last version before edition2024 chain)
      #
      # `|| true` skips gracefully if a package isn't in the current dep graph.
      - name: Generate Cargo.lock and pin edition2024 deps for bundled cargo
        working-directory: ./ecosystem-token
        run: |
          # 1. Resolve full graph with modern cargo
          cargo generate-lockfile

          # 2. Pin edition2024 packages to last bundled-cargo-safe versions.
          #
          # Rule: bundled cargo (~1.75) can't parse ANY Cargo.toml with
          # edition = "2024". Two categories of fix:
          #
          #   A) Package has a pre-edition2024 release → pin to that version.
          #   B) Package ONLY has edition2024 releases (e.g. toml_parser) →
          #      pin the PARENT that introduced it to a version that doesn't
          #      depend on it at all.
          #
          # Known problematic packages (add new ones here as CI finds them):
          #
          #   indexmap  ≥ 2.14.0  → edition2024. Pin to 2.13.2          [A]
          #   block-buffer ≥ 0.11 → edition2024. Pin to 0.10.4          [A]
          #   digest    ≥ 0.11    → edition2024. Pin to 0.10.7          [A]
          #   toml_parser (ALL)   → always edition2024 (new crate).
          #     Fix: pin toml_edit to 0.21.1 — last version that uses   [B]
          #     winnow directly (no toml_parser dep at all).
          #   toml_datetime ≥ 0.6.11 → may be edition2024. Pin 0.6.8.  [A]
          #   shlex ≥ 2.0         → edition2024. Pin to 1.3.0.          [A]
          #
          # All guarded with `|| echo` — if package isn't in graph or
          # version doesn't satisfy other constraints, we skip and continue.
          echo "Pinning edition2024 transitive deps..."

          # Category A — direct version pins
          cargo update -p indexmap      --precise 2.13.2 || echo "indexmap: skipped"
          cargo update -p block-buffer  --precise 0.10.4 || echo "block-buffer: skipped"
          cargo update -p digest        --precise 0.10.7 || echo "digest: skipped"
          cargo update -p toml_datetime --precise 0.6.8  || echo "toml_datetime: skipped"
          cargo update -p shlex         --precise 1.3.0  || echo "shlex: skipped"

          # Category B — parent pins to eliminate edition2024-only crates
          # toml_parser has no pre-edition2024 version; pin its parent toml_edit
          # to 0.21.1 (uses winnow directly, toml_parser never enters graph).
          # Also pin toml to 0.8.12 which uses toml_edit 0.21.x.
          cargo update -p toml_edit     --precise 0.21.1 || echo "toml_edit: skipped"
          cargo update -p toml          --precise 0.8.12 || echo "toml: skipped"

          echo "All pins applied."

          # 3. Downgrade lockfile format v4 → v3
          sed -i 's/^version = 4$/version = 3/' Cargo.lock

          echo "✅ Cargo.lock ready (format v3, edition2024 deps pinned)"
          head -4 Cargo.lock
          echo "--- Key pinned versions in lockfile ---"
          grep -A2 'name = "indexmap"' Cargo.lock | head -3
          grep -A2 'name = "toml_edit"' Cargo.lock | head -3 || true
          grep -A2 'name = "toml_parser"' Cargo.lock | head -3 || echo "(toml_parser not in graph ✅)"

      # ── Build SBF ─────────────────────────────────────────────────────────
      - name: Build smart contract (anchor build → SBF bytecode)
        working-directory: ./ecosystem-token
        run: |
          anchor build
          echo "✅ SBF build complete"

      # ── Validate output ───────────────────────────────────────────────────
      - name: Validate SBF output
        run: |
          SO_FILE="ecosystem-token/target/deploy/ecosystem_token.so"
          if [ ! -f "$SO_FILE" ]; then
            echo "❌ ERROR: ecosystem_token.so not found — build failed"
            exit 1
          fi
          SIZE=$(stat -c%s "$SO_FILE")
          echo "✅ ecosystem_token.so found: $SIZE bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "❌ ERROR: .so file suspiciously small ($SIZE bytes) — build may be corrupt"
            exit 1
          fi
          echo "✅ SBF bytecode validated"

      # ── Collect IDL ───────────────────────────────────────────────────────
      - name: Validate IDL output
        run: |
          IDL_FILE="ecosystem-token/target/idl/ecosystem_token.json"
          if [ ! -f "$IDL_FILE" ]; then
            echo "⚠️  IDL file not found — continuing without it"
          else
            echo "✅ IDL found: $(stat -c%s "$IDL_FILE") bytes"
          fi

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solana-build-${{ github.sha }}
          path: |
            ecosystem-token/target/deploy/ecosystem_token.so
            ecosystem-token/target/idl/ecosystem_token.json
          retention-days: 30
          if-no-files-found: warn

  test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests
        working-directory: ./ecosystem-token
        run: |
          cargo test --lib 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Exit code: $EXIT_CODE"
          exit $EXIT_CODE
        timeout-minutes: 15

      - name: Lint with Clippy
        working-directory: ./ecosystem-token
        run: cargo clippy --all-targets -- -D warnings || true

      - name: Check formatting
        working-directory: ./ecosystem-token
        run: cargo fmt --check || true

  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [build, test]
    timeout-minutes: 20
    # Only deploy on push to main AND when PROGRAM_ID secret is set
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment prerequisites
        id: prereq
        run: |
          if [ -z "${{ secrets.PROGRAM_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  PROGRAM_ID secret not set — skipping devnet deployment"
            echo "    Set PROGRAM_ID and DEPLOY_KEYPAIR secrets to enable auto-deploy"
          elif [ -z "${{ secrets.DEPLOY_KEYPAIR }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  DEPLOY_KEYPAIR secret not set — skipping devnet deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Deployment prerequisites met"
          fi

      - name: Install Solana CLI ${{ env.SOLANA_VERSION }}
        if: steps.prereq.outputs.skip == 'false'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Node.js + Anchor CLI
        if: steps.prereq.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Anchor CLI ${{ env.ANCHOR_VERSION }}
        if: steps.prereq.outputs.skip == 'false'
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Restore Rust
        if: steps.prereq.outputs.skip == 'false'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Write deploy keypair from secret
        if: steps.prereq.outputs.skip == 'false'
        run: |
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > /tmp/deploy-keypair.json
          chmod 600 /tmp/deploy-keypair.json
          echo "✅ Deploy keypair written"

      - name: Configure Solana for devnet
        if: steps.prereq.outputs.skip == 'false'
        run: |
          solana config set --url https://api.devnet.solana.com
          solana config set --keypair /tmp/deploy-keypair.json
          solana config get

      - name: Request devnet SOL airdrop
        if: steps.prereq.outputs.skip == 'false'
        run: |
          BALANCE=$(solana balance | awk '{print $1}')
          echo "Current balance: $BALANCE SOL"
          if (( $(echo "$BALANCE < 0.5" | bc -l) )); then
            echo "Requesting airdrop..."
            solana airdrop 2 || echo "Airdrop failed (rate limited) — continuing with existing balance"
            sleep 10
          fi
          echo "Final balance: $(solana balance)"

      - name: Inject Program ID, pin edition2024 deps, and build
        if: steps.prereq.outputs.skip == 'false'
        run: |
          sed -i "s/declare_id!(\".*\")/declare_id!(\"${{ secrets.PROGRAM_ID }}\")/" \
            ecosystem-token/programs/ecosystem-token/src/lib.rs
          cd ecosystem-token
          cargo generate-lockfile
          cargo update -p indexmap      --precise 2.13.2 || echo "indexmap: skipped"
          cargo update -p block-buffer  --precise 0.10.4 || echo "block-buffer: skipped"
          cargo update -p digest        --precise 0.10.7 || echo "digest: skipped"
          cargo update -p toml_datetime --precise 0.6.8  || echo "toml_datetime: skipped"
          cargo update -p shlex         --precise 1.3.0  || echo "shlex: skipped"
          cargo update -p toml_edit     --precise 0.21.1 || echo "toml_edit: skipped"
          cargo update -p toml          --precise 0.8.12 || echo "toml: skipped"
          sed -i 's/^version = 4$/version = 3/' Cargo.lock
          anchor build

      - name: Deploy to devnet
        if: steps.prereq.outputs.skip == 'false'
        working-directory: ./ecosystem-token
        run: |
          anchor deploy \
            --program-name ecosystem_token \
            --program-keypair /tmp/deploy-keypair.json \
            --provider.cluster devnet
          echo "✅ Deployed to devnet"

      - name: Verify deployment
        if: steps.prereq.outputs.skip == 'false'
        run: |
          PROGRAM_ID="${{ secrets.PROGRAM_ID }}"
          echo "Verifying program on devnet: $PROGRAM_ID"
          solana program show "$PROGRAM_ID" || echo "⚠️  Could not verify — check manually"
          echo "Explorer: https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Cleanup keypair
        if: always() && steps.prereq.outputs.skip == 'false'
        run: rm -f /tmp/deploy-keypair.json
