name: Build Solana Smart Contract

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Verify Node.js
        run: |
          echo "=== Node.js Setup ==="
          node --version
          npm --version
          echo "Node path: $(which node)"
          echo "npm path: $(which npm)"
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Verify Rust
        run: |
          echo "=== Rust Setup ==="
          rustc --version
          cargo --version
          echo "rustc path: $(which rustc)"
      
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-
      
      - name: Install Anchor CLI
        run: |
          echo "=== Installing Anchor CLI ==="
          npm install -g @coral-xyz/anchor
          
          echo "Installation complete, checking npm global bin..."
          NPM_BIN=$(npm config get prefix)/bin
          echo "npm bin directory: $NPM_BIN"
          
          # Add npm bin to PATH
          echo "$NPM_BIN" >> $GITHUB_PATH
          export PATH="$NPM_BIN:$PATH"
          
          echo "Verifying installation..."
          ls -la "$NPM_BIN/anchor" || echo "anchor binary not found at $NPM_BIN"
          "$NPM_BIN/anchor" --version || echo "Could not run anchor from $NPM_BIN"
      
      - name: Verify all tools
        run: |
          echo "=== All Tools Installed ==="
          echo "Node.js: $(node --version)"
          echo "npm: $(npm --version)"
          echo "Rust: $(rustc --version)"
          echo "Cargo: $(cargo --version)"
          
          # Try to run anchor from different locations
          if command -v anchor &> /dev/null; then
            echo "Anchor: $(anchor --version)"
          else
            echo "Anchor not in PATH, trying npm bin directory..."
            NPM_BIN=$(npm config get prefix)/bin
            if [ -f "$NPM_BIN/anchor" ]; then
              echo "Anchor found at: $NPM_BIN/anchor"
              "$NPM_BIN/anchor" --version
            else
              echo "WARNING: Anchor binary not found at $NPM_BIN"
            fi
          fi
      
      - name: Check project
        run: |
          echo "=== Project Structure ==="
          ls -la ecosystem-token/ | head -20
          echo ""
          echo "=== Anchor.toml ==="
          cat ecosystem-token/Anchor.toml | head -15
      
      - name: Build smart contract
        working-directory: ./ecosystem-token
        run: |
          echo "=== Building Smart Contract ==="
          
          # Ensure PATH includes npm bin
          NPM_BIN=$(npm config get prefix)/bin
          export PATH="$NPM_BIN:$PATH"
          
          echo "Using anchor from: $(which anchor || echo "$NPM_BIN/anchor")"
          
          # Try anchor build
          if command -v anchor &> /dev/null; then
            anchor build --skip-lint
          elif [ -f "$NPM_BIN/anchor" ]; then
            "$NPM_BIN/anchor" build --skip-lint
          else
            echo "ERROR: anchor not found!"
            exit 1
          fi
      
      - name: Run tests
        working-directory: ./ecosystem-token
        run: cargo test --lib --release || true
      
      - name: Lint
        working-directory: ./ecosystem-token
        run: cargo clippy --all-targets || true
      
      - name: Format check
        working-directory: ./ecosystem-token
        run: cargo fmt -- --check || true
      
      - name: List artifacts
        if: always()
        run: |
          echo "=== Build Artifacts ==="
          find ecosystem-token/target/deploy -name "*.so" 2>/dev/null || echo "No .so files"
          echo ""
          echo "=== IDL Files ==="
          find ecosystem-token/target/idl -type f 2>/dev/null || echo "No IDL files"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ecosystem-token/target/deploy/*.so
            ecosystem-token/target/idl/
          retention-days: 30
          if-no-files-found: warn

  test:
    runs-on: ubuntu-latest
    name: Test Suite
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run tests
        working-directory: ./ecosystem-token
        run: |
          echo "Running unit tests..."
          cargo test --lib || true
        timeout-minutes: 30


